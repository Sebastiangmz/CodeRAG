name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install baseline validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -e . --no-deps
          python -m pip install pytest pydantic pydantic-settings click PyYAML fastapi structlog ruff mypy

      - name: Run Milestone 0 tests
        run: PYTHONPATH=src python -m pytest tests/test_m0_baseline.py

      - name: Run Milestone 0 lint baseline
        run: ruff check tests/test_m0_baseline.py scripts/evalfly_smoke.py

      - name: Run Milestone 0 type baseline
        run: PYTHONPATH=src mypy tests/test_m0_baseline.py scripts/evalfly_smoke.py

      - name: Compile changed runtime modules
        run: python -m py_compile src/coderag/__init__.py src/coderag/config.py src/coderag/main.py src/coderag/cli.py src/coderag/indexing/embeddings.py src/coderag/generation/generator.py tests/test_m0_baseline.py scripts/evalfly_smoke.py

      - name: Build package
        run: python -m build

      - name: Run committed EvalFly smoke baseline
        run: python scripts/evalfly_smoke.py --suite smoke
